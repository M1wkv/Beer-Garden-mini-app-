<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Bar App</title>

  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link rel="stylesheet" href="./css/base.css?v=20260425-imagefix" />
  <link rel="stylesheet" href="./css/components.css?v=20260425-imagefix" />
  <link rel="stylesheet" href="./css/screens.css?v=20260425-imagefix" />
</head>

<body data-screen="home">
  <header id="header">
    <div class="header-row">
      <button class="back" id="headerBack" type="button" onclick="handleHeaderBack()" aria-label="Назад">
        <img src="./icons/arrow.svg" alt="" />
      </button>
      <span id="headerTitle">Главное меню</span>
      <button class="header-shortcut hidden" id="headerBarShortcut" type="button" onclick="openBar()" aria-label="Бар">
        <span>Бар</span>
        <img src="./icons/arrow.svg" alt="" />
      </button>
      <button class="header-shortcut hidden" id="headerMenuShortcut" type="button" onclick="openMenu()" aria-label="Меню">
        <span>Меню</span>
        <img src="./icons/arrow.svg" alt="" />
      </button>
    </div>
    <div class="categories" id="categories"></div>
  </header>

  <main>
    <section id="home" class="screen home-screen">
      <div class="home-hero" aria-label="Скидка 20% на все меню">
        <img src="./img/home-hero.png?v=20260425-imagefix" alt="" />
      </div>

      <div class="slider-dots" aria-hidden="true">
        <span></span>
        <span class="active"></span>
        <span></span>
      </div>

      <nav class="home-grid" aria-label="Разделы приложения">
        <button class="tile" type="button" onclick="openMenu()">Меню</button>
        <button class="tile" type="button" onclick="openBar()">Бар</button>
      </nav>
    </section>

    <section id="menuScreen" class="screen menu-screen hidden">
      <div class="menu" id="menu"></div>
    </section>

    <section id="contactsScreen" class="screen hidden">
      <div class="home-grid contacts-grid">
        <button class="tile" type="button" onclick="openMap()">📍<span>Локация</span></button>
        <button class="tile" type="button" onclick="openInstagram()">📸<span>Instagram</span></button>
        <button class="tile" type="button" onclick="openTelegram()">💬<span>Telegram</span></button>
        <button class="tile" type="button" onclick="callPhone()">☎<span>Позвонить</span></button>
      </div>
    </section>

    <section id="reservationScreen" class="screen reservation-screen hidden">
      <form class="reservation-form" onsubmit="submitReservation(event)">
        <label>
          Имя
          <input id="reservationName" type="text" autocomplete="name" required />
        </label>

        <label>
          Телефон
          <input id="reservationPhone" type="tel" autocomplete="tel" required />
        </label>

        <label>
          Дата
          <input id="reservationDate" type="date" required />
        </label>

        <label>
          Время
          <input id="reservationTime" type="time" required />
        </label>

        <label>
          Количество гостей
          <input id="reservationGuests" type="number" min="1" max="30" value="2" required />
        </label>

        <label>
          Комментарий
          <textarea id="reservationComment" placeholder="Пожелания по столику"></textarea>
        </label>

        <button class="submit-btn" type="submit">Отправить заявку</button>
      </form>

      <div class="status" id="reservationStatus"></div>
    </section>

    <section id="cartScreen" class="screen cart-screen hidden">
      <div id="cartItems"></div>
      <div class="order-total" id="total"></div>
    </section>
  </main>

  <button class="cart-btn" id="cartBtn" type="button" onclick="openCart()" aria-label="Открыть корзину">
    <img class="cart-icon" src="./icons/basket.svg" alt="" />
    <span>Блокнот заказа</span>
    <span class="badge" id="cartCount">0</span>
  </button>

  <script>
    window.BG_BACKEND_BASE_URL = "https://beer-garden-mini-app.vercel.app";
  </script>
  <script src="./js/state.js?v=20260425-imagefix"></script>
  <script src="./js/errors.js?v=20260425-imagefix"></script>
  <script src="./js/screens.js?v=20260425-imagefix"></script>
  <script src="./js/menu.js?v=20260425-imagefix"></script>
  <script src="./js/cart.js?v=20260425-imagefix"></script>
  <script src="./js/reservation.js?v=20260425-imagefix"></script>
  <script src="./js/contacts.js?v=20260425-imagefix"></script>
  <script src="./js/telegram.js?v=20260425-imagefix"></script>
  <script src="./js/app.js?v=20260425-imagefix"></script>
</body>
</html>
