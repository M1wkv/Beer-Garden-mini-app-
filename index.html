<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Bar App</title>

  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/screens.css" />
</head>

<body>
  <header id="header">Главное меню</header>

  <main>
    <section id="home" class="screen home">
      <button class="tile" type="button" onclick="openMenu()">Меню</button>
      <button class="tile" type="button" onclick="openBar()">Барное меню</button>
      <button class="tile" type="button" onclick="openReservation()">Бронирование</button>
      <button class="tile" type="button">Оставить отзыв</button>
      <button class="tile" type="button">Фотоотчет</button>
      <button class="tile" type="button">Акции</button>
      <button class="tile" type="button" onclick="openContacts()">Контакты</button>
    </section>

    <section id="menuScreen" class="screen hidden">
      <button class="back" type="button" onclick="goHome()">← Назад</button>
      <div class="categories" id="categories"></div>
      <div class="menu" id="menu"></div>
    </section>

    <section id="contactsScreen" class="screen hidden">
      <button class="back" type="button" onclick="goHome()">← Назад</button>

      <div class="home contacts-grid">
        <button class="tile" type="button" onclick="openMap()">📍<span>Локация</span></button>
        <button class="tile" type="button" onclick="openInstagram()">📸<span>Instagram</span></button>
        <button class="tile" type="button" onclick="openTelegram()">💬<span>Telegram</span></button>
        <button class="tile" type="button" onclick="callPhone()">☎<span>Позвонить</span></button>
      </div>
    </section>

    <section id="reservationScreen" class="screen hidden">
      <button class="back" type="button" onclick="goHome()">← Назад</button>

      <form class="reservation-form" onsubmit="submitReservation(event)">
        <label>
          Имя
          <input id="reservationName" type="text" autocomplete="name" required />
        </label>

        <label>
          Телефон
          <input id="reservationPhone" type="tel" autocomplete="tel" required />
        </label>

        <label>
          Дата
          <input id="reservationDate" type="date" required />
        </label>

        <label>
          Время
          <input id="reservationTime" type="time" required />
        </label>

        <label>
          Количество гостей
          <input id="reservationGuests" type="number" min="1" max="30" value="2" required />
        </label>

        <label>
          Комментарий
          <textarea id="reservationComment" placeholder="Пожелания по столику"></textarea>
        </label>

        <button class="submit-btn" type="submit">Отправить заявку</button>
      </form>

      <div class="status" id="reservationStatus"></div>
    </section>

    <section id="cartScreen" class="screen cart-screen hidden">
      <button class="back" type="button" onclick="goBackFromCart()">← Назад</button>
      <h2>Ваш заказ</h2>
      <div id="cartItems"></div>
      <div class="total" id="total"></div>
    </section>
  </main>

  <button class="cart-btn" id="cartBtn" type="button" onclick="openCart()" aria-label="Открыть корзину">
    🛒
    <span class="badge" id="cartCount">0</span>
  </button>

  <script src="./js/state.js"></script>
  <script src="./js/screens.js"></script>
  <script src="./js/menu.js"></script>
  <script src="./js/cart.js"></script>
  <script src="./js/reservation.js"></script>
  <script src="./js/contacts.js"></script>
  <script src="./js/telegram.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
