<!DOCTYPE html>
<html lang="ru">
<head>

<!-- =========================
  META И ОСНОВНЫЕ НАСТРОЙКИ СТРАНИЦЫ
  - кодировка
  - адаптивность под мобильные устройства
  - заголовок вкладки
========================= -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bar App</title>

<!-- =========================
  TELEGRAM WEB APP SDK
  Позволяет:
  - работать внутри Telegram Mini App
  - управлять интерфейсом Telegram (expand, theme и т.д.)
========================= -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- =========================
  СТИЛИ ПРИЛОЖЕНИЯ (CSS)
========================= -->
<style>

/* === БАЗОВЫЕ СТИЛИ СТРАНИЦЫ ===
   - убираем отступы
   - задаем шрифт
   - темный фон приложения
*/
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* === HEADER (верхняя панель) ===
   - используется как заголовок экрана
*/
header {
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

/* === ГЛАВНОЕ МЕНЮ (плитки) ===
   - сетка 2xN
*/
.home {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

/* === ПЛИТКИ В МЕНЮ ===
   - кнопки перехода
*/
.tile {
  background:#1a1a1a;
  border-radius:15px;
  padding:30px;
  text-align:center;
  cursor:pointer;
}

/* === КАТЕГОРИИ МЕНЮ ===
   - горизонтальный скролл
*/
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

/* === ОТДЕЛЬНАЯ КАТЕГОРИЯ === */
.category {
  background:#1f1f1f;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* === АКТИВНАЯ КАТЕГОРИЯ ===
   - подсветка выбранной категории
*/
.category.active {
  background:#00ffcc;
  color:black;
}

/* === СПИСОК БЛЮД === */
.menu {
  padding:10px;
}

/* === КАРТОЧКА БЛЮДА ===
   - flex для выравнивания
*/
.card {
  background:#1a1a1a;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* === СЧЕТЧИК (+ / -) === */
.counter {
  display:flex;
  gap:10px;
  align-items:center;
}

/* === КНОПКИ +/- === */
.btn {
  background:#00ffcc;
  color:black;
  border:none;
  border-radius:50%;
  width:32px;
  height:32px;
  cursor:pointer;
}

/* === КНОПКА КОРЗИНЫ (плавающая) === */
.cart-btn {
  position:fixed;
  bottom:20px;
  left:20px;

  background:#00ffcc;
  width:55px;
  height:55px;
  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:22px;

  /* изначально скрыта */
  opacity:0;
  transform:scale(0.7);

  /* плавная анимация появления */
  transition:all 0.3s ease;
}

/* === СОСТОЯНИЕ "ПОКАЗАТЬ КОРЗИНУ" === */
.cart-btn.show {
  opacity:1;
  transform:scale(1);
}

/* === БЕЙДЖ С КОЛ-ВОМ === */
.badge {
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  border-radius:50%;
  padding:4px 7px;
}

/* === МОДАЛКА КОРЗИНЫ === */
.cart-modal {
  position:fixed;
  bottom:0;
  width:100%;
  height:80%;

  background:#111;
  border-radius:20px 20px 0 0;

  padding:20px;

  /* скрыта по умолчанию */
  display:none;
}

/* === СКРЫТИЕ ЭЛЕМЕНТОВ === */
.hidden {
  display:none;
}

/* === КНОПКА НАЗАД === */
.back {
  padding:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- =========================
  HEADER (заголовок текущего экрана)
========================= -->
<header id="header">Главное меню</header>

<!-- =========================
  ГЛАВНЫЙ ЭКРАН (плитки)
========================= -->
<div id="home" class="home">
  <div class="tile" onclick="openMenu()">Меню</div>
  <div class="tile" onclick="openBar()">Барное меню</div>
  <div class="tile">Оставить отзыв</div>
  <div class="tile">Фотоотчет</div>
  <div class="tile">Акции</div>
  <div class="tile" onclick="openContacts()">Контакты</div>
</div>

<!-- =========================
  ЭКРАН МЕНЮ
  - категории
  - список блюд
========================= -->
<div id="menuScreen" class="hidden">
  <div class="back" onclick="goHome()">← Назад</div>
  <div class="categories" id="categories"></div>
  <div class="menu" id="menu"></div>
</div>

<!-- =========================
  ЭКРАН КОНТАКТОВ
========================= -->
<div id="contactsScreen" class="hidden">
  <div class="back" onclick="goHome()">← Назад</div>
</div>

<!-- =========================
  КНОПКА КОРЗИНЫ
  - появляется при добавлении товаров
========================= -->
<div class="cart-btn" id="cartBtn">
  🛒
  <div class="badge" id="cartCount">0</div>
</div>

<!-- =========================
  МОДАЛКА КОРЗИНЫ
========================= -->
<div class="cart-modal" id="cartModal">
  <div class="back" onclick="closeCart()">← Назад</div>
  <h3>Ваш заказ</h3>
  <div id="cartItems"></div>
  <div id="total"></div>
</div>

<script>

/* =========================
   DOM ЭЛЕМЕНТЫ
   - получаем доступ к элементам страницы
========================= */
const home = document.getElementById("home");
const menuScreen = document.getElementById("menuScreen");
const contactsScreen = document.getElementById("contactsScreen");
const header = document.getElementById("header");

const categories = document.getElementById("categories");
const menu = document.getElementById("menu");

const cartBtn = document.getElementById("cartBtn");
const cartCount = document.getElementById("cartCount");

const cartModal = document.getElementById("cartModal");
const cartItems = document.getElementById("cartItems");
const totalEl = document.getElementById("total");


/* =========================
   API (источники данных)
   - Google Sheets через opensheet
========================= */
const MENU_API = "https://opensheet.elk.sh/...";
const BAR_API = "https://opensheet.elk.sh/...";


/* =========================
   СОСТОЯНИЕ ПРИЛОЖЕНИЯ
========================= */
let menuData = {};   // сгруппированное меню
let itemIndex = {};  // быстрый доступ к товару по имени
let cart = {};       // корзина
let cache = {};      // кэш API
let currentAPI = MENU_API;


/* =========================
   ИНИЦИАЛИЗАЦИЯ
========================= */
loadCart();
updateCartCount();


/* =========================
   НАВИГАЦИЯ МЕЖДУ ЭКРАНАМИ
========================= */
function openMenu(){currentAPI=MENU_API;openScreen("Меню");}
function openBar(){currentAPI=BAR_API;openScreen("Барное меню");}

function openContacts(){
  home.classList.add("hidden");
  menuScreen.classList.add("hidden");
  contactsScreen.classList.remove("hidden");
  header.innerText="Контакты";
}

function openScreen(title){
  home.classList.add("hidden");
  menuScreen.classList.remove("hidden");
  contactsScreen.classList.add("hidden");
  header.innerText=title;
  loadData(currentAPI);
}

function goHome(){
  home.classList.remove("hidden");
  menuScreen.classList.add("hidden");
  contactsScreen.classList.add("hidden");
  header.innerText="Главное меню";
}


/* =========================
   ЗАГРУЗКА ДАННЫХ
   - fetch API
   - кэширование
========================= */
async function loadData(api){

  /* если есть в кэше — не грузим заново */
  if(cache[api]){
    menuData = cache[api];
    renderCategories();
    return;
  }

  try {
    const res = await fetch(api);
    const data = await res.json();

    menuData = {};
    itemIndex = {};

    /* группировка по категориям */
    data.forEach(item=>{
      const cat=(item.category||item.Category||"").trim();
      const name=item.name||item.Name;

      if(!cat || !name) return;

      if(!menuData[cat]) menuData[cat]=[];
      menuData[cat].push(item);

      itemIndex[name]=item;
    });

    cache[api]=menuData;
    renderCategories();

  } catch(e){
    alert("Ошибка загрузки меню");
  }
}


/* =========================
   РЕНДЕР UI
========================= */

/* категории */
function renderCategories(){
  categories.innerHTML="";
  const keys = Object.keys(menuData);

  keys.forEach((cat,i)=>{
    const d=document.createElement("div");
    d.className="category";
    d.innerText=cat;

    d.onclick=()=>{
      document.querySelectorAll(".category").forEach(e=>e.classList.remove("active"));
      d.classList.add("active");
      showCategory(cat);
    };

    /* первая категория активна */
    if(i===0){
      d.classList.add("active");
      showCategory(cat);
    }

    categories.appendChild(d);
  });
}

/* товары */
function showCategory(cat){
  menu.innerHTML="";

  menuData[cat].forEach(item=>{
    const name=item.name||item.Name;
    const price=item.price||item.Price;
    const count=cart[name]?.count||0;

    const div=document.createElement("div");
    div.className="card";
    div.dataset.name=name;

    div.innerHTML=`
      <div>
        <div>${name}</div>
        <div>${price} сум</div>
      </div>
      <div class="counter">${renderCounter(name,count)}</div>
    `;

    menu.appendChild(div);
  });
}

/* счетчик +/- */
function renderCounter(name,count){
  return count===0
    ? `<button class="btn" data-add="${name}">+</button>`
    : `
      <button class="btn" data-minus="${name}">-</button>
      <span>${count}</span>
      <button class="btn" data-add="${name}">+</button>
    `;
}


/* =========================
   ОБРАБОТКА СОБЫТИЙ
========================= */
document.addEventListener("click",(e)=>{
  if(e.target.dataset.add) changeCount(e.target.dataset.add,1);
  if(e.target.dataset.minus) changeCount(e.target.dataset.minus,-1);
  if(e.target.id==="cartBtn") openCart();
});


/* =========================
   ЛОГИКА КОРЗИНЫ
========================= */
let lock=false;

/* изменение количества */
function changeCount(name,delta){

  /* защита от быстрого клика */
  if(lock) return;
  lock=true;
  setTimeout(()=>lock=false,80);

  if(!cart[name]) cart[name]={count:0,price:0};

  const item=itemIndex[name];

  /* очистка цены от текста */
  const price=parseInt((item.price||item.Price||"0").replace(/\D/g,''))||0;

  cart[name].count+=delta;
  cart[name].price=price;

  if(cart[name].count<=0) delete cart[name];

  /* ограничение */
  if(cart[name]?.count>10) cart[name].count=10;

  saveCart();
  updateCartCount();
  updateCardUI(name);
}

/* обновление карточки */
function updateCardUI(name){
  const el=document.querySelector(`[data-name="${name}"]`);
  if(!el) return;

  const count=cart[name]?.count||0;
  el.querySelector(".counter").innerHTML=renderCounter(name,count);
}

/* обновление счетчика корзины */
function updateCartCount(){
  let total=0;
  Object.values(cart).forEach(i=>total+=i.count);

  if(total>0){
    cartBtn.classList.add("show");
    cartCount.innerText=total;
  } else {
    cartBtn.classList.remove("show");
  }
}


/* =========================
   МОДАЛКА КОРЗИНЫ
========================= */
function openCart(){
  cartModal.style.display="block";
  renderCart();
}

function closeCart(){
  cartModal.style.display="none";
}

/* рендер корзины */
function renderCart(){
  let total=0;
  cartItems.innerHTML="";

  Object.keys(cart).forEach(name=>{
    const item=cart[name];
    const sum=item.count*item.price;
    total+=sum;

    const div=document.createElement("div");
    div.innerHTML=`${name} x${item.count} — ${sum} сум`;
    cartItems.appendChild(div);
  });

  totalEl.innerText="Итого: "+total+" сум";
}


/* =========================
   LOCAL STORAGE
   - сохранение корзины
========================= */
function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
}

function loadCart(){
  cart=JSON.parse(localStorage.getItem("cart")||"{}");
}


/* =========================
   ЗАПУСК ПРИЛОЖЕНИЯ
========================= */
loadData(currentAPI);

/* интеграция с Telegram */
const tg=window.Telegram.WebApp;
tg.expand();

</script>

</body>
</html>
