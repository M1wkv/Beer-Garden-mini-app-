<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bar App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* ========= БАЗОВЫЕ СТИЛИ ========= */
body {margin:0;font-family:Arial;background:#0f0f0f;color:white;}
header {padding:20px;font-size:22px;font-weight:bold;}

/* ========= ГЛАВНОЕ МЕНЮ (HOME SCREEN) ========= */
.home {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

/* Кнопки плитки главного меню */
.tile {
  background:#1a1a1a;
  border-radius:15px;
  padding:30px;
  text-align:center;
  cursor:pointer;
}

/* ========= КАТЕГОРИИ МЕНЮ ========= */
.categories {display:flex;overflow-x:auto;padding:10px;gap:10px;}
.category {background:#1f1f1f;padding:10px;border-radius:10px;cursor:pointer;}
.category.active {background:#00ffcc;color:black;}

/* ========= СПИСОК БЛЮД ========= */
.menu {padding:10px;}

/* Карточка блюда */
.card {
  background:#1a1a1a;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Счетчик +/- */
.counter {display:flex;gap:10px;align-items:center;}

/* Кнопки + и - */
.btn {
  background:#00ffcc;
  color:black;
  border:none;
  border-radius:50%;
  width:32px;
  height:32px;
  cursor:pointer;
}

/* ========= КНОПКА КОРЗИНЫ ========= */
.cart-btn {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#00ffcc;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  opacity:0;
  transform:scale(0.7);
  transition:all 0.3s ease;
}

/* Когда корзина активна */
.cart-btn.show {
  opacity:1;
  transform:scale(1);
}

/* Количество товаров */
.badge {
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  border-radius:50%;
  padding:4px 7px;
}

/* ========= МОДАЛКА КОРЗИНЫ ========= */
.cart-modal {
  position:fixed;
  bottom:0;
  width:100%;
  height:80%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:20px;
  display:none;
}

/* Скрытие экранов */
.hidden {display:none;}

/* Кнопка назад */
.back {padding:10px;cursor:pointer;}
</style>
</head>

<body>

<!-- ========= HEADER (ЗАГОЛОВОК СТРАНИЦЫ) ========= -->
<header id="header">Главное меню</header>


<!-- ========= ГЛАВНОЕ МЕНЮ (HOME PAGE) ========= -->
<div id="home" class="home">
  <div class="tile" onclick="openMenu()">Меню</div>
  <div class="tile" onclick="openBar()">Барное меню</div>
  <div class="tile">Оставить отзыв</div>
  <div class="tile">Фотоотчет</div>
  <div class="tile">Акции</div>
  <div class="tile" onclick="openContacts()">Контакты</div>
</div>


<!-- ========= СТРАНИЦА МЕНЮ (ЕДА / БАР) ========= -->
<div id="menuScreen" class="hidden">
  
  <!-- Кнопка назад -->
  <div class="back" onclick="goHome()">← Назад</div>

  <!-- Категории (салаты, закуски и т.д.) -->
  <div class="categories" id="categories"></div>

  <!-- Список блюд -->
  <div class="menu" id="menu"></div>
</div>


<!-- ========= СТРАНИЦА КОНТАКТОВ ========= -->
<div id="contactsScreen" class="hidden">
  <div class="back" onclick="goHome()">← Назад</div>
  <!-- сюда можно добавить адрес, карту и т.д. -->
</div>


<!-- ========= КНОПКА КОРЗИНЫ ========= -->
<div class="cart-btn" id="cartBtn">
  🛒
  <div class="badge" id="cartCount">0</div>
</div>


<!-- ========= СТРАНИЦА КОРЗИНЫ (МОДАЛКА) ========= -->
<div class="cart-modal" id="cartModal">
  <div class="back" onclick="closeCart()">← Назад</div>
  <h3>Ваш заказ</h3>

  <!-- Список товаров -->
  <div id="cartItems"></div>

  <!-- Итоговая сумма -->
  <div id="total"></div>
</div>


<script>

/* ========= DOM (ССЫЛКИ НА ЭЛЕМЕНТЫ СТРАНИЦЫ) ========= */
const home = document.getElementById("home"); // главное меню
const menuScreen = document.getElementById("menuScreen"); // экран меню
const contactsScreen = document.getElementById("contactsScreen"); // контакты
const header = document.getElementById("header"); // заголовок

const categories = document.getElementById("categories"); // категории
const menu = document.getElementById("menu"); // список блюд

const cartBtn = document.getElementById("cartBtn"); // кнопка корзины
const cartCount = document.getElementById("cartCount"); // счетчик

const cartModal = document.getElementById("cartModal"); // модалка корзины
const cartItems = document.getElementById("cartItems"); // список товаров
const totalEl = document.getElementById("total"); // итог


/* ========= API (ИСТОЧНИК ДАННЫХ) ========= */
const MENU_API = "URL меню";
const BAR_API = "URL бара";


/* ========= STATE (СОСТОЯНИЕ ПРИЛОЖЕНИЯ) ========= */
let menuData = {}; // все меню
let itemIndex = {}; // быстрый доступ к товарам
let cart = {}; // корзина
let cache = {}; // кэш
let currentAPI = MENU_API;


/* ========= INIT (ЗАПУСК ПРИЛОЖЕНИЯ) ========= */
loadCart();
updateCartCount();


/* ========= НАВИГАЦИЯ МЕЖДУ СТРАНИЦАМИ ========= */

// открыть меню еды
function openMenu(){
  currentAPI=MENU_API;
  openScreen("Меню");
}

// открыть бар
function openBar(){
  currentAPI=BAR_API;
  openScreen("Барное меню");
}

// открыть контакты
function openContacts(){
  home.classList.add("hidden");
  menuScreen.classList.add("hidden");
  contactsScreen.classList.remove("hidden");
  header.innerText="Контакты";
}

// универсальное открытие страницы меню
function openScreen(title){
  home.classList.add("hidden");
  menuScreen.classList.remove("hidden");
  contactsScreen.classList.add("hidden");
  header.innerText=title;

  loadData(currentAPI);
}

// назад в главное меню
function goHome(){
  home.classList.remove("hidden");
  menuScreen.classList.add("hidden");
  contactsScreen.classList.add("hidden");
  header.innerText="Главное меню";
}


/* ========= ЗАГРУЗКА ДАННЫХ ========= */
async function loadData(api){
  ...
}


/* ========= РЕНДЕР (ОТРИСОВКА UI) ========= */
function renderCategories(){ ... }
function showCategory(cat){ ... }
function renderCounter(name,count){ ... }


/* ========= СОБЫТИЯ ========= */
document.addEventListener("click",(e)=>{ ... });


/* ========= ЛОГИКА КОРЗИНЫ ========= */
function changeCount(name,delta){ ... }
function updateCardUI(name){ ... }
function updateCartCount(){ ... }


/* ========= МОДАЛКА КОРЗИНЫ ========= */
function openCart(){ ... }
function closeCart(){ ... }
function renderCart(){ ... }


/* ========= LOCAL STORAGE ========= */
function saveCart(){ ... }
function loadCart(){ ... }


/* ========= СТАРТ ========= */
loadData(currentAPI);

const tg=window.Telegram.WebApp;
tg.expand();

</script>

</body>
</html>
