<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bar App</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white;}
header {padding:20px;font-size:22px;font-weight:bold;}

.home {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.tile {
  background:#1a1a1a;
  border-radius:15px;
  padding:30px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}
.tile:active {transform:scale(0.97);}

.categories {display:flex;overflow-x:auto;padding:10px;gap:10px;}
.category {background:#1f1f1f;padding:10px;border-radius:10px;cursor:pointer;}
.category.active {background:#00ffcc;color:black;}

.menu {padding:10px;}

.card {
  background:#1a1a1a;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}
.card:active {transform:scale(0.97);}

.counter {display:flex;gap:10px;align-items:center;}

.btn {
  background:#00ffcc;
  color:black;
  border:none;
  border-radius:50%;
  width:32px;
  height:32px;
  cursor:pointer;
}

/* корзина */
.cart-btn {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#00ffcc;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;

  opacity:0;
  transform:scale(0.7);
  transition:all 0.3s ease;
}

.cart-btn.show {
  opacity:1;
  transform:scale(1);
}

.cart-btn.bounce {
  animation:bounce 0.3s ease;
}

@keyframes bounce {
  0% {transform:scale(1);}
  50% {transform:scale(1.15);}
  100% {transform:scale(1);}
}

.badge {
  position:absolute;
  top:-5px;
  right:-5px;
  background:red;
  color:white;
  font-size:12px;
  border-radius:50%;
  padding:4px 7px;
}

.cart-modal {
  position:fixed;
  bottom:0;
  width:100%;
  height:80%;
  background:#111;
  border-radius:20px 20px 0 0;
  padding:20px;
  display:none;
  animation:slideUp 0.3s ease;
}

@keyframes slideUp {
  from {transform:translateY(100%);}
  to {transform:translateY(0);}
}

.hidden {display:none;}
.back {padding:10px;cursor:pointer;}

.remove {
  color:red;
  margin-left:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header id="header">Главное меню</header>

<!-- ГЛАВНАЯ -->
<div id="home" class="home">
  <div class="tile" onclick="openMenu()">Меню</div>
  <div class="tile" onclick="openBar()">Барное меню</div>
  <div class="tile">Оставить отзыв</div>
  <div class="tile">Фотоотчет</div>
  <div class="tile">Акции</div>
  <div class="tile" onclick="openContacts()">Контакты</div>
</div>

<!-- МЕНЮ -->
<div id="menuScreen" class="hidden">
  <div class="back" onclick="goHome()">← Назад</div>
  <div class="categories" id="categories"></div>
  <div class="menu" id="menu"></div>
</div>

<!-- КОНТАКТЫ -->
<div id="contactsScreen" class="hidden">
  <div class="back" onclick="goHome()">← Назад</div>

  <div class="home" style="padding-top:10px">
    <div class="tile" onclick="openMap()">📍<br>Локация</div>
    <div class="tile" onclick="openInstagram()">📸<br>Instagram</div>
    <div class="tile" onclick="openTelegram()">💬<br>Telegram</div>
    <div class="tile" onclick="callPhone()">📞<br>Позвонить</div>
  </div>
</div>

<!-- КОРЗИНА -->
<div class="cart-btn" id="cartBtn" onclick="openCart()">
  🛒
  <div class="badge" id="cartCount">0</div>
</div>

<div class="cart-modal" id="cartModal">
  <div class="back" onclick="closeCart()">← Назад</div>
  <h3>Ваш заказ</h3>
  <div id="cartItems"></div>
  <div id="total"></div>
</div>

<script>
const MENU_API = "https://opensheet.elk.sh/1aM-b8gNRiDYoRxXYAybXe-cA4RLPybxaOYPkJUVLlfw/Menu";
const BAR_API = "https://opensheet.elk.sh/1aM-b8gNRiDYoRxXYAybXe-cA4RLPybxaOYPkJUVLlfw/Bar";

let menuData = {};
let cart = {};
let currentAPI = MENU_API;

function openMenu(){currentAPI=MENU_API;openScreen("Меню");}
function openBar(){currentAPI=BAR_API;openScreen("Барное меню");}

function openContacts(){
  home.classList.add("hidden");
  menuScreen.classList.add("hidden");
  contactsScreen.classList.remove("hidden");
  header.innerText="Контакты";
}

function openScreen(title){
  home.classList.add("hidden");
  menuScreen.classList.remove("hidden");
  contactsScreen.classList.add("hidden");
  header.innerText=title;
  loadData(currentAPI);
}

function goHome(){
  home.classList.remove("hidden");
  menuScreen.classList.add("hidden");
  contactsScreen.classList.add("hidden");
  header.innerText="Главное меню";
}

async function loadData(api){
  const res=await fetch(api);
  const data=await res.json();

  menuData={};

  data.forEach(item=>{
    const cat=(item.category||item.Category||"").trim();
    if(!cat)return;

    if(!menuData[cat])menuData[cat]=[];
    menuData[cat].push(item);
  });

  renderCategories();
  showCategory(Object.keys(menuData)[0]);
}

function renderCategories(){
  categories.innerHTML="";
  Object.keys(menuData).forEach((cat,i)=>{
    const d=document.createElement("div");
    d.className="category";
    d.innerText=cat;

    d.onclick=()=>{
      document.querySelectorAll(".category").forEach(e=>e.classList.remove("active"));
      d.classList.add("active");
      showCategory(cat);
    };

    if(i===0)d.classList.add("active");
    categories.appendChild(d);
  });
}

function showCategory(cat){
  menu.innerHTML="";

  menuData[cat].forEach(item=>{
    const name=item.name||item.Name;
    const price=item.price||item.Price;
    const count=cart[name]?.count||0;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div>
        <div>${name}</div>
        <div>${price} сум</div>
      </div>

      <div class="counter">
        ${
          count===0
          ? `<button class="btn" onclick="changeCount('${name}',1)">+</button>`
          : `
            <button class="btn" onclick="changeCount('${name}',-1)">-</button>
            <span>${count}</span>
            <button class="btn" onclick="changeCount('${name}',1)">+</button>
          `
        }
      </div>
    `;

    menu.appendChild(div);
  });
}

function changeCount(name,delta){
  if(!cart[name]) cart[name]={count:0,price:0};

  const item = Object.values(menuData).flat().find(i => (i.name||i.Name) === name);
  const price = parseInt((item.price||item.Price||"0").replace(/\D/g,'')) || 0;

  cart[name].count+=delta;
  cart[name].price=price;

  if(cart[name].count<=0) delete cart[name];
  if(cart[name]?.count>10) cart[name].count=10;

  updateCartCount();
  showCategory(document.querySelector(".category.active").innerText);
}

function updateCartCount(){
  let total=0;
  Object.values(cart).forEach(i=>total+=i.count);

  if(total>0){
    cartBtn.classList.add("show");
    cartCount.innerText=total;

    cartBtn.classList.add("bounce");
    setTimeout(()=>cartBtn.classList.remove("bounce"),300);
  } else {
    cartBtn.classList.remove("show");
  }
}

function openCart(){
  cartModal.style.display="block";
  renderCart();
}

function closeCart(){
  cartModal.style.display="none";
}

function renderCart(){
  let total=0;
  cartItems.innerHTML="";

  Object.keys(cart).forEach(name=>{
    const item=cart[name];
    const sum=item.count*item.price;
    total+=sum;

    const div=document.createElement("div");
    div.innerHTML=`
      ${name} x${item.count} — ${sum} сум
      <span class="remove" onclick="removeItem('${name}')">❌</span>
    `;
    cartItems.appendChild(div);
  });

  document.getElementById("total").innerText="Итого: "+total+" сум";
}

function removeItem(name){
  delete cart[name];
  updateCartCount();
  renderCart();
  showCategory(document.querySelector(".category.active").innerText);
}

/* контакты */
function openMap(){window.open("https://maps.google.com/?q=Ташкент","_blank");}
function openInstagram(){window.open("https://instagram.com/","_blank");}
function openTelegram(){window.open("https://t.me/","_blank");}
function callPhone(){window.location.href="tel:+998901234567";}

loadData(MENU_API);

const tg=window.Telegram.WebApp;
tg.expand();
</script>

</body>
</html>
